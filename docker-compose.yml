services:
  qq-farm-bot-ui:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: qq-farm-bot-ui
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Please set a strong ADMIN_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?Please set ADMIN_JWT_SECRET (>=16 chars)}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-}
      ADMIN_TRUST_PROXY: ${ADMIN_TRUST_PROXY:-loopback, linklocal, uniquelocal}
      ADMIN_BIND_TOKEN_IP: ${ADMIN_BIND_TOKEN_IP:-1}
      FARM_SINGLE_WRITER_STRICT: ${FARM_SINGLE_WRITER_STRICT:-1}
      FARM_PERSIST_STRICT_CONFLICT: ${FARM_PERSIST_STRICT_CONFLICT:-1}
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/core/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
